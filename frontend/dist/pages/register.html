ame</label> <input type="text" name="firstname" id="firstname" class="form-control firstname" required placeholder="Write your first name here"></div><div class="col-12 col-md-12 col-lg-6 form-group mt-3" data-required="true"><label for="lastname">Last Name</label> <input type="text" name="lastname" id="lastname" class="form-control lastname" required placeholder="Write your last name here"></div></div></div><div class="form-group mt-3" data-required="true"><label for="datebirthday">Date Birthday</label> <input type="datetime-local" step="1" name="datebirthday" id="datebirthday" class="form-control datebirthday" value="1990-01-01T00:00:00" required placeholder="Write or select your date of birthday here"></div><div class="form-group mt-3" data-required="false"><label for="avatar">Avatar (Image)</label> <input type="file" name="avatar" id="avatar" class="form-control avatar" placeholder="Upload your avatar image here"> <button type="button" class="btn btn-primary mt-3 btnprevavatar" id="btnprevavatar">Preview my avatar</button><div class="blkprevavatar hidden" id="blkprevavatar"><img src="assets/images/guest.png" alt="guest" class="img-fluid avatarprev mt-3" loading="lazy"></div></div><div class="form-group mt-3" data-required="false"><label for="cover">Cover (Image)</label> <input type="file" name="cover" id="cover" class="form-control cover" placeholder="Upload your cover image here"> <button type="button" class="btn btn-primary mt-3 btnprevcover" id="btnprevcover">Preview my cover</button><figure class="blkprevcover mt-3 hidden" id="blkprevcover"><img src="assets/images/default.webp" alt="guest" class="img-fluid coverprev" loading="lazy"><figcaption>The max is 1200px (width) x 300px (height)</figcaption></figure></div><div class="form-group mt-3" data-required="true"><input type="checkbox" name="accept_terms" id="accept_terms" class="accept_terms"> <label for="accept_terms">I read and accept the terms of service and privacy policy!</label></div><div class="form-gr
